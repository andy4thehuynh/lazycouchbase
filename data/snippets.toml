# SQL++ snippet library for the query editor's snippet picker (tab).
#
# Each snippet needs: name, category, template, example, description, docs.
# - template is what enter inserts: a single-line skeleton whose %{keyspace}
#   placeholder is filled from the sidebar selection, with concise
#   placeholders for everything collection-specific: f1/f2/f3 for fields,
#   "v1"/"v2" for values, "k1" for a document key, a1 for an array-valued
#   field, and ks2 for a second keyspace in joins and subqueries.
# - example is what the preview shows: the same statement written against
#   the travel-sample dataset, runnable as-is.
# Docs links point at the Couchbase Server SQL++ reference.

[[snippets]]
name = "Select fields"
category = "Basics"
template = 'SELECT f1, f2 FROM %{keyspace} LIMIT 10'
example = 'SELECT name, country FROM `travel-sample`.inventory.airline LIMIT 10'
description = "Project just the fields you need instead of * — the fastest way to learn a collection's shape."
docs = 'https://docs.couchbase.com/server/current/n1ql/n1ql-language-reference/selectclause.html'

[[snippets]]
name = "Document key with META()"
category = "Basics"
template = 'SELECT META().id, f1 FROM %{keyspace} LIMIT 10'
example = 'SELECT META().id, name FROM `travel-sample`.inventory.airline LIMIT 10'
description = "The document key lives outside the JSON body — META().id brings it into the result."
docs = 'https://docs.couchbase.com/server/current/n1ql/n1ql-language-reference/metafun.html'

[[snippets]]
name = "Fetch by key (USE KEYS)"
category = "Basics"
template = 'SELECT * FROM %{keyspace} USE KEYS "k1"'
example = 'SELECT * FROM `travel-sample`.inventory.airline USE KEYS "airline_10"'
description = "A key-value fetch through SQL++ — no index needed, the fastest lookup Couchbase has."
docs = 'https://docs.couchbase.com/server/current/n1ql/n1ql-language-reference/hints.html'

[[snippets]]
name = "Distinct values"
category = "Basics"
template = 'SELECT DISTINCT f1 FROM %{keyspace}'
example = 'SELECT DISTINCT country FROM `travel-sample`.inventory.airline'
description = "Deduplicate the projection — handy for discovering what values a field actually holds."
docs = 'https://docs.couchbase.com/server/current/n1ql/n1ql-language-reference/selectclause.html'

[[snippets]]
name = "Order, limit, offset"
category = "Basics"
template = 'SELECT f1 FROM %{keyspace} ORDER BY f1 ASC LIMIT 10 OFFSET 10'
example = 'SELECT name FROM `travel-sample`.inventory.airline ORDER BY name ASC LIMIT 10 OFFSET 10'
description = "Sort and page through results — OFFSET skips rows, LIMIT caps the page size."
docs = 'https://docs.couchbase.com/server/current/n1ql/n1ql-language-reference/orderby.html'

[[snippets]]
name = "Pattern match with LIKE"
category = "Filtering"
template = 'SELECT f1 FROM %{keyspace} WHERE f1 LIKE "%v1%"'
example = 'SELECT name FROM `travel-sample`.inventory.airline WHERE name LIKE "%Air%"'
description = "SQL-style wildcards: % matches any run of characters, _ matches exactly one."
docs = 'https://docs.couchbase.com/server/current/n1ql/n1ql-language-reference/comparisonops.html'

[[snippets]]
name = "Range with BETWEEN"
category = "Filtering"
template = 'SELECT f1, f2 FROM %{keyspace} WHERE f2 BETWEEN 1000 AND 2000 LIMIT 10'
example = 'SELECT airportname, geo.alt FROM `travel-sample`.inventory.airport WHERE geo.alt BETWEEN 1000 AND 2000 LIMIT 10'
description = "Inclusive range filter, both ends included — works on numbers, strings, and dates alike."
docs = 'https://docs.couchbase.com/server/current/n1ql/n1ql-language-reference/comparisonops.html'

[[snippets]]
name = "Membership with IN"
category = "Filtering"
template = 'SELECT f1, f2 FROM %{keyspace} WHERE f2 IN ["v1", "v2"] LIMIT 10'
example = 'SELECT name, country FROM `travel-sample`.inventory.airline WHERE country IN ["France", "United Kingdom"] LIMIT 10'
description = "Match against a list of values — the list is a real JSON array, brackets and all."
docs = 'https://docs.couchbase.com/server/current/n1ql/n1ql-language-reference/comparisonops.html'

[[snippets]]
name = "MISSING vs NULL"
category = "Filtering"
template = 'SELECT f1, f2 FROM %{keyspace} WHERE f2 IS NULL LIMIT 10'
example = 'SELECT name, callsign FROM `travel-sample`.inventory.airline WHERE callsign IS NULL LIMIT 10'
description = "NULL is present-but-empty; an absent field is MISSING — the biggest departure from SQL. Swap IS NULL for IS MISSING and compare."
docs = 'https://docs.couchbase.com/server/current/n1ql/n1ql-language-reference/comparisonops.html'

[[snippets]]
name = "Default with IFMISSINGORNULL"
category = "Filtering"
template = 'SELECT f1, IFMISSINGORNULL(f2, "v1") AS f2 FROM %{keyspace} LIMIT 10'
example = 'SELECT name, IFMISSINGORNULL(callsign, "n/a") AS callsign FROM `travel-sample`.inventory.airline LIMIT 10'
description = "Substitute a fallback when a field is absent or null — IFMISSING and IFNULL exist too, each catching just one case."
docs = 'https://docs.couchbase.com/server/current/n1ql/n1ql-language-reference/conditionalops.html'

[[snippets]]
name = "Group and count"
category = "Aggregation"
template = 'SELECT f1, COUNT(*) AS total FROM %{keyspace} GROUP BY f1 ORDER BY total DESC'
example = 'SELECT country, COUNT(*) AS total FROM `travel-sample`.inventory.airline GROUP BY country ORDER BY total DESC'
description = "The classic rollup — one row per group with how many documents fall into each."
docs = 'https://docs.couchbase.com/server/current/n1ql/n1ql-language-reference/groupby.html'

[[snippets]]
name = "Filter groups with HAVING"
category = "Aggregation"
template = 'SELECT f1, COUNT(*) AS total FROM %{keyspace} GROUP BY f1 HAVING COUNT(*) > 5 ORDER BY total DESC'
example = 'SELECT country, COUNT(*) AS total FROM `travel-sample`.inventory.airline GROUP BY country HAVING COUNT(*) > 5 ORDER BY total DESC'
description = "WHERE filters rows before grouping; HAVING filters the groups after aggregation."
docs = 'https://docs.couchbase.com/server/current/n1ql/n1ql-language-reference/groupby.html'

[[snippets]]
name = "Name an aggregate with LETTING"
category = "Aggregation"
template = 'SELECT f1, total FROM %{keyspace} GROUP BY f1 LETTING total = COUNT(*) ORDER BY total DESC'
example = 'SELECT country, total FROM `travel-sample`.inventory.airline GROUP BY country LETTING total = COUNT(*) ORDER BY total DESC'
description = "LETTING binds a name to an aggregate after grouping so you can reuse it without repeating."
docs = 'https://docs.couchbase.com/server/current/n1ql/n1ql-language-reference/groupby.html'

[[snippets]]
name = "Min, max, average"
category = "Aggregation"
template = 'SELECT MIN(f1) AS lowest, MAX(f1) AS highest, ROUND(AVG(f1)) AS average FROM %{keyspace}'
example = 'SELECT MIN(geo.alt) AS lowest, MAX(geo.alt) AS highest, ROUND(AVG(geo.alt)) AS average FROM `travel-sample`.inventory.airport'
description = "Summary statistics in one pass over the whole collection."
docs = 'https://docs.couchbase.com/server/current/n1ql/n1ql-language-reference/aggregatefun.html'

[[snippets]]
name = "Flatten with UNNEST"
category = "Arrays"
template = 'SELECT d.f1, e.f2 FROM %{keyspace} d UNNEST d.a1 e LIMIT 10'
example = 'SELECT r.airline, s.day, s.flight FROM `travel-sample`.inventory.route r UNNEST r.schedule s LIMIT 10'
description = "Turn each array element into its own row — one route becomes one row per scheduled flight."
docs = 'https://docs.couchbase.com/server/current/n1ql/n1ql-language-reference/unnest.html'

[[snippets]]
name = "Match inside arrays (ANY)"
category = "Arrays"
template = 'SELECT f1 FROM %{keyspace} WHERE ANY e IN a1 SATISFIES e.f2 = "v1" END LIMIT 10'
example = 'SELECT name FROM `travel-sample`.inventory.hotel WHERE ANY r IN reviews SATISFIES r.ratings.Overall = 5 END LIMIT 10'
description = "Filter parents by their children: hotels where at least one review scored a perfect 5."
docs = 'https://docs.couchbase.com/server/current/n1ql/n1ql-language-reference/collectionops.html'

[[snippets]]
name = "Transform with ARRAY"
category = "Arrays"
template = 'SELECT ARRAY e.f1 FOR e IN a1 WHEN e.f2 = "v1" END AS picked FROM %{keyspace} LIMIT 5'
example = 'SELECT ARRAY s.flight FOR s IN schedule WHEN s.day = 1 END AS monday_flights FROM `travel-sample`.inventory.route LIMIT 5'
description = "An array comprehension: map and filter an array in place without unnesting it."
docs = 'https://docs.couchbase.com/server/current/n1ql/n1ql-language-reference/collectionops.html'

[[snippets]]
name = "Join on document keys"
category = "Joins"
template = 'SELECT l.f1, r.f2 FROM %{keyspace} l JOIN ks2 r ON KEYS l.f3 LIMIT 10'
example = 'SELECT r.airline, a.name, r.sourceairport, r.destinationairport FROM `travel-sample`.inventory.route r JOIN `travel-sample`.inventory.airline a ON KEYS r.airlineid LIMIT 10'
description = "The lookup join: the left side stores the right side's document key, so no index is needed."
docs = 'https://docs.couchbase.com/server/current/n1ql/n1ql-language-reference/join.html'

[[snippets]]
name = "ANSI join on a field"
category = "Joins"
template = 'SELECT l.f1, r.f2 FROM %{keyspace} l JOIN ks2 r ON l.f3 = r.f3 LIMIT 10'
example = 'SELECT h.name AS hotel, l.name AS landmark FROM `travel-sample`.inventory.hotel h JOIN `travel-sample`.inventory.landmark l ON h.city = l.city LIMIT 10'
description = "Standard SQL joins on any condition — the right side needs an index on the join key."
docs = 'https://docs.couchbase.com/server/current/n1ql/n1ql-language-reference/join.html'

[[snippets]]
name = "LEFT join keeps the left side"
category = "Joins"
template = 'SELECT l.f1, r.f2 FROM %{keyspace} l LEFT JOIN ks2 r ON KEYS l.f3 LIMIT 10'
example = 'SELECT r.airline, a.name FROM `travel-sample`.inventory.route r LEFT JOIN `travel-sample`.inventory.airline a ON KEYS r.airlineid LIMIT 10'
description = "Rows survive even when the join finds no match — the right side comes back MISSING."
docs = 'https://docs.couchbase.com/server/current/n1ql/n1ql-language-reference/join.html'

[[snippets]]
name = "Filter by subquery"
category = "Subqueries"
template = 'SELECT d.f1, d.f2 FROM %{keyspace} d WHERE d.f2 IN (SELECT RAW s.f2 FROM ks2 s WHERE s.f3 = "v1") LIMIT 10'
example = 'SELECT h.name, h.city FROM `travel-sample`.inventory.hotel h WHERE h.city IN (SELECT RAW l.city FROM `travel-sample`.inventory.landmark l WHERE l.activity = "eat") LIMIT 10'
description = "SELECT RAW strips the wrapper object so the subquery returns a plain list IN can use."
docs = 'https://docs.couchbase.com/server/current/n1ql/n1ql-language-reference/subqueries.html'

[[snippets]]
name = "Create a secondary index"
category = "Indexes & performance"
template = 'CREATE INDEX idx_f1 ON %{keyspace}(f1)'
example = 'CREATE INDEX idx_country ON `travel-sample`.inventory.airline(country)'
description = "Run ctrl-e on a matching query before and after — watch the plan flip from primary scan to index scan."
docs = 'https://docs.couchbase.com/server/current/n1ql/n1ql-language-reference/createindex.html'

[[snippets]]
name = "Create a primary index"
category = "Indexes & performance"
template = 'CREATE PRIMARY INDEX ON %{keyspace}'
example = 'CREATE PRIMARY INDEX ON `travel-sample`.inventory.airline'
description = "A primary index scans everything — fine for learning, an anti-pattern in production."
docs = 'https://docs.couchbase.com/server/current/n1ql/n1ql-language-reference/createprimaryindex.html'

[[snippets]]
name = "Ask the index advisor"
category = "Indexes & performance"
template = 'ADVISE SELECT f1 FROM %{keyspace} WHERE f2 = "v1"'
example = 'ADVISE SELECT name FROM `travel-sample`.inventory.airline WHERE country = "France"'
description = "Prefix any SELECT with ADVISE and the optimizer recommends the index it wishes it had."
docs = 'https://docs.couchbase.com/server/current/n1ql/n1ql-language-reference/advise.html'

[[snippets]]
name = "List all indexes"
category = "Indexes & performance"
template = 'SELECT name, keyspace_id, index_key, state FROM system:indexes ORDER BY keyspace_id'
example = 'SELECT name, keyspace_id, index_key, state FROM system:indexes ORDER BY keyspace_id'
description = "The system catalog is queryable too — every index in the cluster, one row each."
docs = 'https://docs.couchbase.com/server/current/n1ql/n1ql-intro/sysinfo.html'

[[snippets]]
name = "String functions"
category = "Functions"
template = 'SELECT f1, UPPER(f1) AS shouty FROM %{keyspace} WHERE CONTAINS(LOWER(f1), "v1") LIMIT 10'
example = 'SELECT name, UPPER(name) AS shouty FROM `travel-sample`.inventory.airline WHERE CONTAINS(LOWER(name), "air") LIMIT 10'
description = "UPPER, LOWER, CONTAINS, SPLIT and friends — most SQL string functions carry straight over."
docs = 'https://docs.couchbase.com/server/current/n1ql/n1ql-language-reference/stringfun.html'

[[snippets]]
name = "Date functions"
category = "Functions"
template = 'SELECT NOW_STR() AS now, DATE_ADD_STR(NOW_STR(), 30, "day") AS in_thirty_days'
example = 'SELECT NOW_STR() AS now, DATE_ADD_STR(NOW_STR(), 30, "day") AS in_thirty_days'
description = "Dates are strings in JSON — the _STR family parses, shifts, and formats them. No FROM needed."
docs = 'https://docs.couchbase.com/server/current/n1ql/n1ql-language-reference/datefun.html'
